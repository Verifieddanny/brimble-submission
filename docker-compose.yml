# yaml-language-server: $schema=https://json.schemastore.org/docker-compose
version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "2019:2019"
    volumes:
      - ./brimble-engine/caddy.json:/etc/caddy/caddy.json
    command: caddy run --config /etc/caddy/caddy.json

  backend:
    build: ./brimble-engine
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    environment:
      - PORT=8080
      - CADDY_ENDPOINT=http://caddy:2019/config/apps/http/servers/srv0/routes
    depends_on:
      - caddy

  frontend:
    build: ./brimble-ui
    ports:
      - "5173:5173"
    depends_on:
      - backend